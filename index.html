function useAnimateIn(active) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    if (active) { setVisible(false); setTimeout(() => setVisible(true), 60); }
    else setVisible(false);
  }, [active]);
  return visible;
}

const fade = (v, delay = 0) => ({
  opacity: v ? 1 : 0,
  transform: v ? "translateY(0)" : "translateY(28px)",
  transition: `opacity 0.65s ease ${delay}s, transform 0.65s ease ${delay}s`,
});

// ── MAIN APP ──────────────────────────────────────────────────────────────────

export default function PitchDeck() {
  const [current, setCurrent] = useState(0);
  const [showNav, setShowNav] = useState(false);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === "ArrowRight" || e.key === "ArrowDown") setCurrent(c => Math.min(c+1, slides.length-1));
      if (e.key === "ArrowLeft" || e.key === "ArrowUp") setCurrent(c => Math.max(c-1, 0));
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  const SlideComp = slideComponents[slides[current].type];

  return (
    <div style={{ width:"100vw", height:"100vh", background:"#040d1a", display:"flex", flexDirection:"column", overflow:"hidden", fontFamily:"Georgia, serif" }}>
      {/* Main slide area */}
      <div style={{ flex:1, position:"relative", overflow:"hidden" }}>
        <SlideComp active={true} />
      </div>

      {/* Bottom navigation */}
      <div style={{ background:"rgba(4,13,26,0.95)", borderTop:"1px solid rgba(255,255,255,0.06)", padding:"12px 24px", display:"flex", alignItems:"center", gap:16 }}>
        {/* Prev */}
        <button onClick={() => setCurrent(c => Math.max(c-1,0))} disabled={current===0}
          style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", color: current===0 ? "rgba(255,255,255,0.2)" : "#fff", borderRadius:8, padding:"6px 14px", cursor: current===0 ? "default" : "pointer", fontSize:16, transition:"all 0.2s" }}>
          ‹
        </button>

        {/* Dot indicators */}
        <div style={{ display:"flex", gap:6, flex:1, justifyContent:"center" }}>
          {slides.map((_, i) => (
            <button key={i} onClick={() => setCurrent(i)}
              title={slideNames[i]}
              style={{ width: i===current ? 24 : 8, height:8, borderRadius:4, background: i===current ? "#1EAAFF" : "rgba(255,255,255,0.2)", border:"none", cursor:"pointer", transition:"all 0.3s ease", padding:0 }} />
          ))}
        </div>

        {/* Slide name + count */}
        <div style={{ fontSize:12, color:"rgba(255,255,255,0.35)", minWidth:120, textAlign:"center", letterSpacing:"1px" }}>
          {slideNames[current]} · {current+1}/{slides.length}
        </div>

        {/* Next */}
        <button onClick={() => setCurrent(c => Math.min(c+1, slides.length-1))} disabled={current===slides.length-1}
          style={{ background:"rgba(255,255,255,0.06)", border:"1px solid rgba(255,255,255,0.1)", color: current===slides.length-1 ? "rgba(255,255,255,0.2)" : "#fff", borderRadius:8, padding:"6px 14px", cursor: current===slides.length-1 ? "default" : "pointer", fontSize:16, transition:"all 0.2s" }}>
          ›
        </button>
      </div>

      {/* Keyboard hint */}
      <div style={{ position:"absolute", top:16, right:20, fontSize:11, color:"rgba(255,255,255,0.18)", letterSpacing:"1px" }}>
        ← → para navegar
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
